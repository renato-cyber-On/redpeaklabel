<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedPeakLabel | Merch</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <nav>
        <a href="index.html"><img src="redpeaklabel_logo_transparent.png" alt="RedPeakLabel Logo" class="logo"></a>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#music">Music</a></li>
            <li><a href="merch.html">Merch</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="ourartists.html">Our Artists</a></li>
            <li><a href="tour.html">Tour</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="section" id="merch">
        <h2 class="section-title">MERCH</h2>
        
        <div class="merch-grid">
            <div class="merch-item reveal">
                <div class="merch-image">Vinyl</div>
                <h3>Midnight Echoes Vinyl</h3>
                <p class="price">$25</p>
                <button class="btn buy-btn" onclick="addToCart('Midnight Echoes Vinyl')">Buy Now</button>
            </div>
            
            <div class="merch-item reveal">
                <div class="merch-image">T-Shirt</div>
                <h3>RedPeakLabel T-Shirt</h3>
                <p class="price">$20</p>
                <button class="btn buy-btn" onclick="addToCart('RedPeakLabel T-Shirt')">Buy Now</button>
            </div>
            
            <div class="merch-item reveal">
                <div class="merch-image">Hoodie</div>
                <h3>Signed Hoodie</h3>
                <p class="price">$50</p>
                <button class="btn buy-btn" onclick="addToCart('Signed Hoodie')">Buy Now</button>
            </div>
            
            <div class="merch-item reveal">
                <div class="merch-image">Poster</div>
                <h3>Official Poster</h3>
                <p class="price">$10</p>
                <button class="btn buy-btn" onclick="addToCart('Official Poster')">Buy Now</button>
            </div>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
