<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <nav>
        <a href="#home"><img src="redpeaklabel_logo_transparent.png" alt="RedPeakLabel Logo" class="logo"></a>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#music">Music</a></li>
            <li><a href="merch.html">Merch</a></li>

    <section class="hero" id="home">
        <!-- Thunder and Lightning Effects -->
        <div class="storm-container">
            <div class="thunder-bolt bolt-1"></div>
            <div class="thunder-bolt bolt-2"></div>
            <div class="thunder-bolt bolt-3"></div>
        </div>
        
        <!-- Ground impact effect -->
        <div class="ground-impact"></div>
        
        <!-- Ground cracking effects -->
        <div class="ground-crack"></div>
        
        <!-- Shattering ground pieces -->
        <div class="ground-piece piece-1"></div>
        <div class="ground-piece piece-2"></div>
        <div class="ground-piece piece-3"></div>
        
        <h1 id="main-title">REDPEAK</h1>
        <p>REDEFINING THE SOUND OF THE PEAK</p>
        <a href="#music" class="btn">LISTEN NOW</a>
    </section>

    <section class="section" id="music">
        <h2 class="section-title">LATEST RELEASES</h2>
        
        <div class="player-card reveal">
            <button class="play-btn" onclick="togglePlay(this)">▶</button>
            <div>
                <h3>Midnight Echoes</h3>
                <p class="subtitle">RedPeakLabel - Single</p>
            </div>
        </div>

        <div class="player-card reveal">
            <button class="play-btn" onclick="togglePlay(this)">▶</button>
            <div>
                <h3>Summit Shadows</h3>
                <p class="subtitle">RedPeakLabel - EP</p>
            </div>
        </div>

        <div class="player-card reveal">
            <button class="play-btn" onclick="togglePlay(this)">▶</button>
            <div>
                <h3>Crimson Horizon</h3>
                <p class="subtitle">RedPeakLabel - Album</p>
            </div>
        </div>
    </section>
